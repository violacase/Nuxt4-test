# Nginx reverse proxy for Nuxt scaffold (local dev / VPS)
#
# Setup:
#   sudo cp nginx/nuxt-scaffold.conf /etc/nginx/sites-available/nuxt-scaffold.local
#   sudo ln -s /etc/nginx/sites-available/nuxt-scaffold.local /etc/nginx/sites-enabled/
#   echo "127.0.0.1 nuxt-scaffold.local" | sudo tee -a /etc/hosts
#   sudo nginx -t && sudo systemctl reload nginx

upstream nuxt_scaffold {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name nuxt-scaffold.local;

    # Logging
    access_log /var/log/nginx/nuxt-scaffold-access.log;
    error_log  /var/log/nginx/nuxt-scaffold-error.log;

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options  "nosniff"                      always;
    add_header X-XSS-Protection        "0"                            always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Proxy to Nuxt / Nitro
    location / {
        proxy_pass         http://nuxt_scaffold;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Nuxt HMR / SSE)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
    }

    # ── HTTPS (uncomment after running certbot) ────────────────────────────
    # listen 443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # ──────────────────────────────────────────────────────────────────────
}
