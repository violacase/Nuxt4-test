<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue3-test</title>
    <!-- Prevent dark mode / sidebar FOUC: runs before first paint -->
    <script>
      ;(function () {
        var t = localStorage.getItem('settings:theme')
        if (t === 'dark') document.documentElement.classList.add('dark')
        var s = localStorage.getItem('settings:sidebarOpen')
        document.documentElement.style.setProperty(
          '--sidebar-width',
          s === 'false' ? '3.5rem' : '15rem',
        )
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/app/main.ts"></script>
  </body>
</html>
