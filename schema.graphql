scalar DateTime
scalar UUID
scalar JSON

enum UserRole {
  admin
  member
  guest
}

type User {
  id: UUID!
  email: String!
  name: String!
  avatarUrl: String
  role: UserRole!
  createdAt: DateTime!
  updatedAt: DateTime!
}

input UpdateUserInput {
  name: String
  avatarUrl: String
}

type Query {
  _empty: String
  me: User
  getUser(id: UUID!): User
  listUsers: [User!]!
}

type Mutation {
  _empty: String
  updateUser(id: UUID!, input: UpdateUserInput!): User!
  deleteUser(id: UUID!): Boolean!
}
